minimumReleaseAge: 10080 # cooldown period for new packages in minutes (7 days)
minimumReleaseAgeExclude:
  # https://pnpm.io/settings#minimumreleaseageexclude
  - "@aragon/gov-ui-kit"
  - "@aragon/aragon-subdomain"
strictDepBuilds: true
blockExoticSubdeps: true
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 131400 # skip trust checks for packages published >3 months ago

#npm settings
savePrefix: ^
strictPeerDependencies: true
autoInstallPeers: false
sideEffectsCache: true
preferFrozenLockfile: true
dedupePeerDependents: true
ignoreScripts: true
autoInstallTypes: true
nodeVersion: 24.16.0
engineStrict: true

# pnpm package extensions
packageExtensions:
  '@solana/codecs-strings@*':
    dependencies:
      fastestsmallesttextencoderdecoder: ^1.0.22

# pnpm peer dependency rules
peerDependencyRules:
  allowedVersions:
    '@playwright/test': '>=1.48.2'
    playwright-core: '>=1.48.2'
    ws: '>=7.5.0'

# pnpm overrides
overrides:
  isomorphic-dompurify>jsdom: 26.1.0
  axios@>=1.0.0 <1.15.2: ^1.15.2
  '@vercel/node>undici': ^6.24.0
  next>postcss: ^8.5.12
  '@hookform/devtools>uuid': ^14.0.0
  esbuild@<0.28.1: '>=0.28.1'
  tsup@<8.3.5: ^8.5.1
  '@vercel/fun>@tootallnate/once': ^3.0.1
  tar@<7.5.11: ^7.5.11
  ajv@<8.18.0: ^8.18.0
  minimatch@>=10.0.0 <10.2.4: ^10.2.4
  ws@>=8.0.0 <8.21.0: '>=8.21.0'
  glob@>=10.2.0 <10.5.0: '>=10.5.0'
  smol-toml@<1.6.1: '>=1.6.1'
  srvx@<0.11.13: '>=0.11.13'
  path-to-regexp@>=4.0.0 <6.3.0: '>=6.3.0'
  path-to-regexp@>=8.0.0 <8.4.0: '>=8.4.0'
  lodash@<=4.17.23: '>=4.18.0'
  dompurify@<=3.4.10: '>=3.4.11'
  js-yaml@>=4.0.0 <4.1.2: '>=4.2.0'
