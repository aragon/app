# Hotfix Start — cuts a hotfix branch from a tag, cherry-picks fixes from main,
# creates a patch tag (e.g. v1.2.0-hotfix.1), deploys to staging for verification.
# No version bump, no changeset, no PR to main.
# When ready: deploy to prod via App Production workflow_dispatch with the hotfix tag.

name: Hotfix Start

on:
  workflow_dispatch:
    inputs:
      base_tag:
        description: "Tag to hotfix from (default: latest tag)"
        required: false
        type: string
      commits:
        description: "Commit SHAs to cherry-pick from main (comma/space/newline separated)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  start:
    runs-on: ubuntu-latest
    outputs:
      hotfix-tag: ${{ steps.tag.outputs.name }}
      hotfix-sha: ${{ steps.push.outputs.sha }}
      slack-ts: ${{ steps.notify.outputs.ts }}
    steps:
      - name: Load secrets
        id: load-secrets
        uses: 1password/load-secrets-action@v4.0.0
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: '${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}'
          GPG_PASSPHRASE: op://kv_app_infra/arabot-1_SIGN_CERTS/credential
          GPG_PRIVATE_KEY: op://kv_app_infra/arabot-1_SIGN_CERTS/private_key
          ARABOT_PAT: op://kv_app_infra/ARABOT_PAT/credential
          SLACK_BOT_TOKEN: op://kv_app_infra/SLACK_BOT_TOKEN/credential
          SLACK_CHANNEL_ID: op://kv_app_infra/SLACK_CHANNEL_ID/credential

      - name: Checkout actions
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github/actions
            .github/workflows/scripts/slackNotify.js

      - name: Setup
        uses: ./.github/actions/setup
        with:
          token: ${{ steps.load-secrets.outputs.ARABOT_PAT }}
          fetch-depth: 0
          ref: main

      - name: Detect base tag (if not provided)
        id: base
        shell: bash
        run: |
          git fetch --tags --force >/dev/null 2>&1 || true
          if [ -n "${{ inputs.base_tag }}" ]; then
            echo "tag=${{ inputs.base_tag }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [ -z "$TAG" ]; then
            echo "No tags found and base_tag not provided." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Generate hotfix branch name
        id: branch
        shell: bash
        run: echo "name=hotfix/${{ steps.base.outputs.tag }}_$(date +'%Y-%m-%d_%H-%M')" >> "$GITHUB_OUTPUT"

      - name: Ensure hotfix branch from tag
        uses: ./.github/actions/git-ensure-branch
        with:
          branch: ${{ steps.branch.outputs.name }}
          base_ref: ${{ steps.base.outputs.tag }}

      - name: Checkout hotfix branch
        shell: bash
        run: git checkout "${{ steps.branch.outputs.name }}"

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7.0.0
        with:
          gpg_private_key: ${{ steps.load-secrets.outputs.GPG_PRIVATE_KEY }}
          passphrase: ${{ steps.load-secrets.outputs.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Cherry-pick selected commits from main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --force >/dev/null 2>&1 || true

          RAW="${{ inputs.commits }}"
          COMMITS="$(printf "%s" "$RAW" | tr ', ' '\n\n' | sed '/^$/d')"
          if [ -z "$COMMITS" ]; then
            echo "No commits provided." >&2
            exit 1
          fi

          echo "Cherry-picking:"
          echo "$COMMITS"

          while IFS= read -r sha; do
            [ -z "$sha" ] && continue
            git cherry-pick -x "$sha"
          done <<< "$COMMITS"

      - name: Push hotfix branch
        id: push
        shell: bash
        run: |
          set -euo pipefail
          git push origin "HEAD:${{ steps.branch.outputs.name }}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Determine next hotfix tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          BASE="${{ steps.base.outputs.tag }}"
          git fetch --tags --force >/dev/null 2>&1 || true
          # Find existing hotfix tags for this base, pick next number
          EXISTING="$(git tag --list "${BASE}-hotfix.*" | sort -V | tail -1 || true)"
          if [ -z "$EXISTING" ]; then
            NEXT=1
          else
            LAST="${EXISTING##*.}"
            NEXT=$((LAST + 1))
          fi
          echo "name=${BASE}-hotfix.${NEXT}" >> "$GITHUB_OUTPUT"

      - name: Create hotfix tag
        shell: bash
        run: |
          set -euo pipefail
          git tag "${{ steps.tag.outputs.name }}" "${{ steps.push.outputs.sha }}"
          git push origin "${{ steps.tag.outputs.name }}"

      - name: Notify Slack - Hotfix Started
        id: notify
        if: steps.load-secrets.outputs.SLACK_BOT_TOKEN
        uses: ./.github/actions/slack-notify
        with:
          slack_bot_token: ${{ steps.load-secrets.outputs.SLACK_BOT_TOKEN }}
          slack_channel_id: ${{ steps.load-secrets.outputs.SLACK_CHANNEL_ID }}
          message: |
            🩹 *Hotfix Started*
            *Base Tag:* `${{ steps.base.outputs.tag }}`
            *Hotfix Tag:* `${{ steps.tag.outputs.name }}`
            *Branch:* `${{ steps.branch.outputs.name }}`

            Running tests and deploying to staging for verification...
            When ready → deploy to prod via *App Production* workflow with tag `${{ steps.tag.outputs.name }}`

  test:
    needs: start
    runs-on: ubuntu-latest
    steps:
      - name: Checkout actions
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          sparse-checkout: .github/actions/setup

      - name: Setup
        uses: ./.github/actions/setup
        with:
          ref: ${{ needs.start.outputs.hotfix-sha }}
          fetch-depth: 0

      - name: Check types
        run: pnpm type-check

      - name: Check linter with formatter
        run: pnpm lint:check

      - name: Run tests with coverage
        run: pnpm test:coverage

  deploy:
    needs: [start, test]
    uses: ./.github/workflows/shared-deploy.yml
    secrets: inherit
    with:
      domain: 'stg.app.aragon.org'
      env: 'staging'
      ref: ${{ needs.start.outputs.hotfix-sha }}

  e2e:
    needs: deploy
    uses: ./.github/workflows/shared-e2e.yml
    secrets: inherit
    with:
      deployment-url: https://stg.app.aragon.org
      environment: staging

  notify-staging:
    needs: [start, deploy]
    if: ${{ !cancelled() && needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Load secrets
        id: secrets
        uses: 1password/load-secrets-action@v4.0.0
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: '${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}'
          SLACK_BOT_TOKEN: op://kv_app_infra/SLACK_BOT_TOKEN/credential
          SLACK_CHANNEL_ID: op://kv_app_infra/SLACK_CHANNEL_ID/credential

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github/workflows/scripts/slackNotify.js
            .github/actions/slack-notify

      - name: Notify Slack - Staging Deployed
        if: steps.secrets.outputs.SLACK_BOT_TOKEN && needs.start.outputs.slack-ts
        uses: ./.github/actions/slack-notify
        with:
          slack_bot_token: ${{ steps.secrets.outputs.SLACK_BOT_TOKEN }}
          slack_channel_id: ${{ steps.secrets.outputs.SLACK_CHANNEL_ID }}
          thread_ts: ${{ needs.start.outputs.slack-ts }}
          message: |
            ✅ *Hotfix deployed to staging*
            *Hotfix Tag:* `${{ needs.start.outputs.hotfix-tag }}`
            *Staging:* <https://stg.app.aragon.org|stg.app.aragon.org>

            E2E tests are running...

  e2e-notify:
    needs: [start, e2e]
    if: ${{ always() && needs.e2e.result != 'skipped' }}
    runs-on: ubuntu-latest
    steps:
      - name: Load secrets
        id: secrets
        uses: 1password/load-secrets-action@v4.0.0
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: '${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}'
          SLACK_BOT_TOKEN: op://kv_app_infra/SLACK_BOT_TOKEN/credential
          SLACK_CHANNEL_ID: op://kv_app_infra/SLACK_CHANNEL_ID/credential

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github/workflows/scripts/slackNotify.js
            .github/actions/slack-notify

      - name: Notify Slack — E2E results
        if: steps.secrets.outputs.SLACK_BOT_TOKEN && needs.start.outputs.slack-ts
        uses: ./.github/actions/slack-notify
        with:
          slack_bot_token: ${{ steps.secrets.outputs.SLACK_BOT_TOKEN }}
          slack_channel_id: ${{ steps.secrets.outputs.SLACK_CHANNEL_ID }}
          thread_ts: ${{ needs.start.outputs.slack-ts }}
          message: |
            ${{ needs.e2e.outputs.result == 'passed' && '✅ Smoke tests on *staging* passed' || needs.e2e.outputs.result == 'flaky' && '⚠️ Smoke tests on *staging* completed with flaky tests' || needs.e2e.outputs.result == 'failed' && '❌ Smoke tests on *staging* failed' || '⏹️ Smoke tests on *staging* were cancelled' }}
            ${{ needs.e2e.outputs.summary }}
            <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View report>

            Ready for verification? 🧪
            When confirmed → run *App Production* workflow with tag `${{ needs.start.outputs.hotfix-tag }}`
