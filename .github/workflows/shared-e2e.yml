# Shared E2E workflow — runs Playwright smoke tests against a deployed environment.
# Called by app-preview, app-development, app-staging, and app-production after deploy.

name: Shared E2E

on:
  workflow_call:
    inputs:
      deployment-url:
        description: "Base URL to run E2E tests against"
        required: true
        type: string
      environment:
        description: "Environment name (preview, development, staging, production) — used for artifact naming"
        required: true
        type: string
    outputs:
      result:
        description: "Playwright smoke outcome (passed, flaky, failed, cancelled)"
        value: ${{ jobs.e2e.outputs.result }}
      result_label:
        description: "Playwright smoke outcome"
        value: ${{ jobs.e2e.outputs.result_label }}
      summary:
        description: "Playwright smoke summary counts"
        value: ${{ jobs.e2e.outputs.summary }}

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      result: ${{ steps.playwright-result.outputs.result }}
      result_label: ${{ steps.playwright-result.outputs.result_label }}
      summary: ${{ steps.playwright-result.outputs.summary }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github/actions/setup
            .github/actions/parse-playwright-results

      - name: Setup
        uses: ./.github/actions/setup

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5.0.4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm e2e:install

      - name: Install Playwright OS deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Warmup deployment
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$E2E_BASE_URL" || true)
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 10
          done
          echo "::warning::Warmup did not get 200 — proceeding anyway"
        env:
          E2E_BASE_URL: ${{ inputs.deployment-url }}

      - name: Run smoke tests
        id: smoke
        continue-on-error: true
        run: pnpm e2e:smoke
        env:
          E2E_BASE_URL: ${{ inputs.deployment-url }}

      - name: Parse Playwright results
        id: playwright-result
        if: always()
        uses: ./.github/actions/parse-playwright-results
        with:
          report-path: e2e/test-results/results.json
          step-outcome: ${{ steps.smoke.outcome }}

      - name: Upload HTML report
        uses: actions/upload-artifact@v7.0.0
        if: always()
        with:
          name: playwright-report-${{ inputs.environment }}
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload traces on failure
        uses: actions/upload-artifact@v7.0.0
        if: ${{ always() && steps.playwright-result.outputs.result != 'passed' }}
        with:
          name: playwright-traces-${{ inputs.environment }}
          path: e2e/test-results/
          retention-days: 7
