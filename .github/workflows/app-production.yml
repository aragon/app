# App Production — deploys to production when a GitHub Release is published.
# Also supports manual trigger for hotfixes.

name: App Production

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to deploy (e.g. v1.17.0)"
        required: true
        type: string
  release:
    types: [published]

concurrency:
  group: production-deployment
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag exists
        run: |
          git ls-remote --tags --exit-code "${{ github.server_url }}/${{ github.repository }}.git" "refs/tags/${{ inputs.tag }}" || \
            (echo "::error::Tag '${{ inputs.tag }}' does not exist" && exit 1)

  notify-start:
    needs: validate
    if: ${{ !cancelled() && (needs.validate.result == 'success' || needs.validate.result == 'skipped') }}
    runs-on: ubuntu-latest
    outputs:
      slack-ts: ${{ steps.set-ts.outputs.ts }}
    steps:
      - name: Load secrets
        id: secrets
        uses: 1password/load-secrets-action@v4.0.0
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: '${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}'
          SLACK_BOT_TOKEN: op://kv_app_infra/SLACK_BOT_TOKEN/credential
          SLACK_CHANNEL_ID: op://kv_app_infra/SLACK_CHANNEL_ID/credential

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github/workflows/scripts/slackNotify.js
            .github/actions/extract-slack-ts
            .github/actions/slack-notify

      - name: Get release body via API
        id: release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          BODY="$(gh release view "$TAG" --json body -q .body 2>/dev/null || echo "")"
          {
            echo 'body<<RELEASE_BODY_EOF'
            echo "$BODY"
            echo 'RELEASE_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Extract Slack TS from release body
        id: ts
        if: github.event_name == 'release'
        uses: ./.github/actions/extract-slack-ts
        with:
          body: ${{ steps.release.outputs.body }}

      - name: Notify Slack - Production Deploy Started (in release thread)
        id: notify-thread
        if: steps.ts.outputs.ts && steps.secrets.outputs.SLACK_BOT_TOKEN
        uses: ./.github/actions/slack-notify
        with:
          slack_bot_token: ${{ steps.secrets.outputs.SLACK_BOT_TOKEN }}
          slack_channel_id: ${{ steps.secrets.outputs.SLACK_CHANNEL_ID }}
          thread_ts: ${{ steps.ts.outputs.ts }}
          message: |
            🚀 *Production build & deploy started...*
            *Tag:* `${{ github.event.release.tag_name || inputs.tag }}`

      - name: Notify Slack - Production Deploy Started (new message)
        id: notify-new
        if: ${{ !steps.ts.outputs.ts && steps.secrets.outputs.SLACK_BOT_TOKEN }}
        uses: ./.github/actions/slack-notify
        with:
          slack_bot_token: ${{ steps.secrets.outputs.SLACK_BOT_TOKEN }}
          slack_channel_id: ${{ steps.secrets.outputs.SLACK_CHANNEL_ID }}
          message: |
            🚀 *Production deploy started*
            *Tag:* `${{ github.event.release.tag_name || inputs.tag }}`
            *Triggered by:* ${{ github.actor }}

      - name: Set final TS output
        id: set-ts
        shell: bash
        run: |
          TS="${{ steps.ts.outputs.ts || steps.notify-new.outputs.ts }}"
          echo "ts=$TS" >> "$GITHUB_OUTPUT"

  deploy:
    needs: [validate, notify-start]
    if: ${{ !cancelled() && (needs.validate.result == 'success' || needs.validate.result == 'skipped') }}
    uses: ./.github/workflows/shared-deploy.yml
    secrets: inherit
    with:
      domain: "app.aragon.org"
      env: "production"
      ref: ${{ github.event.release.tag_name || inputs.tag }}

  e2e:
    needs: deploy
    if: ${{ !cancelled() && needs.deploy.result == 'success' }}
    uses: ./.github/workflows/shared-e2e.yml
    secrets: inherit
    with:
      deployment-url: https://app.aragon.org
      environment: production

  e2e-notify:
    needs: [notify-start, e2e]
    if: ${{ always() && needs.e2e.result != 'skipped' }}
    runs-on: ubuntu-latest
    steps:
      - name: Load secrets
        id: secrets
        uses: 1password/load-secrets-action@v4.0.0
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: '${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}'
          SLACK_BOT_TOKEN: op://kv_app_infra/SLACK_BOT_TOKEN/credential
          SLACK_CHANNEL_ID: op://kv_app_infra/SLACK_CHANNEL_ID/credential

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github/workflows/scripts/slackNotify.js
            .github/actions/slack-notify

      - name: Notify Slack — E2E results
        if: steps.secrets.outputs.SLACK_BOT_TOKEN && needs.notify-start.outputs.slack-ts
        env:
          ARTIFACT_VIEWER_HOST: gh-artifact-viewer.aragonservices.in
        uses: ./.github/actions/slack-notify
        with:
          slack_bot_token: ${{ steps.secrets.outputs.SLACK_BOT_TOKEN }}
          slack_channel_id: ${{ steps.secrets.outputs.SLACK_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-start.outputs.slack-ts }}
          message: |
            ${{ needs.e2e.outputs.result == 'passed' && '✅ Smoke tests on *production* passed' || needs.e2e.outputs.result == 'flaky' && '⚠️ Smoke tests on *production* completed with flaky tests' || needs.e2e.outputs.result == 'failed' && '❌ Smoke tests on *production* failed' || '⏹️ Smoke tests on *production* were cancelled' }}
            ${{ needs.e2e.outputs.summary }}
            <https://${{ env.ARTIFACT_VIEWER_HOST }}/${{ github.repository }}/${{ needs.e2e.outputs.report_artifact_id }}/index.html|View report>

  notify:
    needs: [notify-start, deploy]
    if: ${{ !cancelled() && needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Load secrets
        id: secrets
        uses: 1password/load-secrets-action@v4.0.0
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: '${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}'
          SLACK_BOT_TOKEN: op://kv_app_infra/SLACK_BOT_TOKEN/credential
          SLACK_CHANNEL_ID: op://kv_app_infra/SLACK_CHANNEL_ID/credential

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github/workflows/scripts/slackNotify.js
            .github/actions/slack-notify

      - name: Notify Slack
        if: steps.secrets.outputs.SLACK_BOT_TOKEN && needs.notify-start.outputs.slack-ts
        uses: ./.github/actions/slack-notify
        with:
          slack_bot_token: ${{ steps.secrets.outputs.SLACK_BOT_TOKEN }}
          slack_channel_id: ${{ steps.secrets.outputs.SLACK_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-start.outputs.slack-ts }}
          message: |
            🎉 *Production Deployed!*

            *Tag:* `${{ github.event.release.tag_name || inputs.tag }}`
            *Production:* <https://app.aragon.org|app.aragon.org>

            If there are issues with the release, use hotfix or rollback.
