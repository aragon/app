# Lido Money Machine demo — nginx routing
#
# Drop-in for the existing nginx server that already terminates traffic for
# tests.aragon.in.  Append the four `location` blocks below into that
# `server { ... }` (or `include` this file from inside it — see below).
#
# Topology assumed by these locations:
#
#   Cloudflare (Flexible SSL, terminates TLS at edge)
#       │  plain HTTP :80 over CF IP ranges only (UFW + nginx allow-list)
#       ▼
#   host nginx (this config) ───► docker compose stack on 127.0.0.1
#                                    /rpc      → anvil  :8545
#                                    /graphql  → hasura :8080 → /v1/graphql
#                                    /manifest.json → file (host bind path)
#
# CORS is wide-open intentionally: this is throw-away demo infra, and the
# Aragon Vercel previews change origin per PR.  Tighten by replacing the
# `*` with a specific allow-list once the demo is stable.
#
# Cloudflare-real-IP rewriting (so logs aren't all CF edge IPs):
# `include /etc/nginx/cloudflare-real-ip.conf;` should be set globally,
# generated from https://www.cloudflare.com/ips/ (refresh quarterly).

# ────────────────────────────────────────────────────────────────────────────
# Option A:  paste these four `location` blocks directly into the existing
#            `server { listen 80; server_name tests.aragon.in; ... }`.
#
# Option B:  keep them here and reference via
#            `include /etc/nginx/snippets/lmm-demo.conf;` from inside the
#            tests.aragon.in server block.  In that case rename this file
#            to /etc/nginx/snippets/lmm-demo.conf.
# ────────────────────────────────────────────────────────────────────────────

# ---------------------------------------------------------------------------
# 1.  JSON-RPC against anvil (mainnet fork).
# ---------------------------------------------------------------------------
location = /rpc {
    # CORS preflight — must return 204 before proxying.  nginx requires the
    # full header set inside the `if` block (add_header doesn't inherit
    # across `if` branches), so it's duplicated below for non-OPTIONS.
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin  "*";
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Demo-Key";
        add_header Access-Control-Max-Age       "86400";
        add_header Content-Length               "0";
        add_header Content-Type                 "text/plain";
        return 204;
    }

    proxy_pass         http://127.0.0.1:8545/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;

    # Strip anvil's own CORS headers — anvil emits `Access-Control-Allow-
    # Origin: *` + `Vary: origin, ...` on its own; without hiding those
    # we'd end up with two ACA-Origin lines on every response and some
    # browsers reject on duplicates.  nginx is the single source of CORS.
    proxy_hide_header  Access-Control-Allow-Origin;
    proxy_hide_header  Access-Control-Allow-Methods;
    proxy_hide_header  Access-Control-Allow-Headers;
    proxy_hide_header  Access-Control-Allow-Credentials;
    proxy_hide_header  Access-Control-Expose-Headers;
    proxy_hide_header  Vary;

    # `always` so headers also attach to 4xx/5xx from anvil (otherwise the
    # browser blocks the response as a CORS error and you can't see it).
    add_header Access-Control-Allow-Origin  "*"                            always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS"           always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Demo-Key" always;
}

# ---------------------------------------------------------------------------
# 2.  Envio's Hasura GraphQL (public role, read-only).
# ---------------------------------------------------------------------------
location = /graphql {
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin  "*";
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Demo-Key, x-hasura-admin-secret";
        add_header Access-Control-Max-Age       "86400";
        add_header Content-Length               "0";
        add_header Content-Type                 "text/plain";
        return 204;
    }

    # Hasura's GraphQL endpoint is /v1/graphql.  We rewrite at the proxy
    # layer so the public URL stays clean.
    proxy_pass         http://127.0.0.1:8080/v1/graphql;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto https;
    # Hasura supports subscriptions over WebSockets; uncomment if the demo
    # uses them (we currently don't — Envio polls).
    # proxy_set_header   Upgrade           $http_upgrade;
    # proxy_set_header   Connection        "upgrade";

    # Strip Hasura's own CORS headers — even with HASURA_GRAPHQL_DISABLE_CORS
    # we keep belt-and-braces here in case the compose env drifts.  Hasura
    # echoes `Origin: <whatever>` + `Access-Control-Allow-Credentials: true`
    # by default, which conflicts with our wildcard origin and breaks the
    # response in every modern browser.
    proxy_hide_header  Access-Control-Allow-Origin;
    proxy_hide_header  Access-Control-Allow-Methods;
    proxy_hide_header  Access-Control-Allow-Headers;
    proxy_hide_header  Access-Control-Allow-Credentials;
    proxy_hide_header  Access-Control-Expose-Headers;
    proxy_hide_header  Vary;

    add_header Access-Control-Allow-Origin  "*"                            always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS"           always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Demo-Key, x-hasura-admin-secret" always;
}

# ---------------------------------------------------------------------------
# 3.  Manifest — static file written by init-demo.sh into MANIFEST_OUTPUT_DIR
#                (default /srv/lmm).  Must match that path here.
# ---------------------------------------------------------------------------
location = /manifest.json {
    alias        /srv/lmm/manifest.json;
    default_type application/json;

    add_header Access-Control-Allow-Origin "*"        always;
    # Browsers cache aggressively; for a demo we want every refresh to
    # pick up post-`init-demo.sh` rewrites.
    add_header Cache-Control               "no-store" always;
}

# ---------------------------------------------------------------------------
# 4.  Healthcheck (used by curl smoke-tests; no CORS needed).
# ---------------------------------------------------------------------------
location = /healthz {
    default_type text/plain;
    return       200 "ok\n";
}
