# Lido Money Machine demo — VM stack
#
# Four services: anvil (mainnet fork), postgres + envio + hasura (indexer).
# TLS termination + CORS + path routing happen on the host nginx (configured
# separately — see ./nginx.lmm-demo.conf for a drop-in snippet).  Cloudflare
# fronts the host nginx in Flexible mode (TLS terminates at CF edge; CF talks
# to origin :80 over plain HTTP).
#
# Bring up:
#   cp .env.vm.example .env
#   $EDITOR .env   # MAINNET_RPC + POSTGRES_PASSWORD + HASURA_ADMIN_SECRET
#   docker compose up -d
#   ./init-demo.sh
#
# Tear down:
#   docker compose down -v   # WARNING: drops anvil state + indexer DB
#
# Daily ops:
#   docker compose logs -f anvil
#   docker compose exec anvil cast block latest --rpc-url http://localhost:8545
#   curl https://tests.aragon.in/manifest.json | jq .

name: lmm-demo

services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    restart: unless-stopped
    # --silent keeps logs sane; --auto-impersonate lets Jordi's scripts sign as any address;
    # --state + --state-interval gives us crash-safety (anvil writes state every 30s);
    # --chain-id 1 keeps mainnet contract checks happy (Lido stETH/wstETH/Curve/LDO).
    entrypoint: ["anvil"]
    command:
      - "--fork-url=${MAINNET_RPC}"
      - "--chain-id=1"
      - "--auto-impersonate"
      - "--host=0.0.0.0"
      - "--port=8545"
      - "--state=/data/anvil.json"
      - "--state-interval=30"
      - "--silent"
    volumes:
      - lmm-data:/data
    # Bind to loopback only — host nginx proxies /rpc to here.  We never want
    # 8545 exposed publicly (UFW already blocks it, but defense in depth).
    ports:
      - "127.0.0.1:8545:8545"

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: envio
    volumes:
      - lmm-pg:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d envio"]
      interval: 10s
      timeout: 5s
      retries: 10

  envio:
    # The capital-flow-indexer image is built locally from the indexer repo,
    # mounted in by the host (see HOST_INDEXER_PATH in .env).  `envio start`
    # connects to postgres + our anvil RPC.  See infra/lmm-demo/README.md
    # for build instructions.
    image: node:22-bookworm-slim
    restart: unless-stopped
    working_dir: /indexer
    depends_on:
      postgres:
        condition: service_healthy
      anvil:
        condition: service_started
    environment:
      ENVIO_PG_HOST: postgres
      ENVIO_PG_PORT: "5432"
      ENVIO_PG_USER: postgres
      ENVIO_PG_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      ENVIO_PG_DATABASE: envio
      # Anvil RPC, used by handlers for token metadata eth_calls AND (via
      # config.yaml's `rpc.for: sync` directive on chain-id 1) as the primary
      # data-source — HyperSync is intentionally bypassed for the LMM fork.
      ENVIO_DEMO_RPC_URL: http://anvil:8545
      # Block at which Envio starts indexing chain-id 1.  Init-demo.sh writes
      # the actual fork-block (manifest.blockNumber - 5) into /srv/lmm/.env
      # after every `just demo-up`; we read it from there via env_file.  The
      # default here is the bootstrap value used before init-demo.sh has run
      # for the first time.
      ENVIO_DEMO_START_BLOCK: ${ENVIO_DEMO_START_BLOCK:-25179300}
    env_file:
      # Optional override file written by init-demo.sh; safe to be missing on
      # first boot (compose treats a missing env_file as empty).
      - path: /srv/lmm/.env.indexer
        required: false
    volumes:
      - ${HOST_INDEXER_PATH:-../../../../capital-flow-indexer}:/indexer
    command: ["sh", "-c", "corepack enable && cd /indexer && pnpm install --frozen-lockfile && pnpm codegen && pnpm start"]
    expose:
      - "8080"

  hasura:
    image: hasura/graphql-engine:v2.42.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-changeme}@postgres:5432/envio
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "false"
      # Anonymous reads use the `public` role.  Mutations / admin console
      # require HASURA_GRAPHQL_ADMIN_SECRET, which we never proxy publicly.
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_ADMIN_SECRET:-changeme}
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: "public"
    # Loopback-only — host nginx proxies /graphql to here.
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  lmm-data:
  lmm-pg:
